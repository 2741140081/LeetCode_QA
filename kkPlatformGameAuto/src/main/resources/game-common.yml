game:
  auto:
    # 基础路径配置
    base-dir: D:/image/automation

    # 图像识别通用配置
    image-recognition:
      default-scale: 0.6667
      # 置信度
      similarityThreshold: 0.75
      # 图片每次识别的间隔
      interval: 500
      # 矩形框粗细
      rect-thickness: 2
      # 矩形颜色配置 (BGR 格式)
      rect-color-b: 0.0
      rect-color-g: 0.0
      rect-color-r: 255.0
    # 超时配置 (毫秒)
    timeout:
      default-time: 3000
      short-time: 1000
      medium-time: 5000
      long-time: 10000
      window-switch-time: 1000
      find-image-time: 5000
    # 等待配置 (毫秒)
    wait-time:
      default-time: 3000
      short-time: 1000
      medium-time: 5000
      long-time: 10000
    # 重试配置
    retry:
      max-attempts: 3
      delay: 1000
      backoff-multiplier: 1.5

    # 鼠标键盘操作配置
    operation:
      click-delay: 100
      double-click-interval: 300
      key-press-duration: 100
      mouse-move-speed: 100
      move-duration: 200
      event-delay: 50  # 事件延迟时间，单位毫秒
      skill-delay: 200 # 技能间隔时间，单位毫秒
      move-view-duration: 100 # 移动视角持续视角
    # 窗口配置
    window:
      # 平台和准备房间窗口名称（同名）
      platform-and-room-name: KK官方对战平台
      # 修改器窗口名称
      modifier-name: 魔兽3内存修改器
      # 游戏主体窗口名称
      game-name: Warcraft III
      # 窗口切换等待时间
      switch-wait-time: 1000
      # 窗口切换超时时间
      timeout: 5000
      # 是否启用窗口位置固定功能
      enable-position-fix: true
      # 平台窗口位置配置
      platform:
        x: 0
        y: 0
        width: 1280
        height: 720
      # 修改器窗口位置配置
      modifier:
        x: 1280
        y: 0
        width: 640
        height: 480
      # 游戏窗口位置配置
      game:
        x: 0
        y: 0
        width: 1920
        height: 1080
    # 截图配置
    screenshot:
      # 结果保存目录
      result-dir: ${game.auto.base-dir}/results
      # 临时截图目录
      temp-dir: ${game.auto.base-dir}/temp
      # 图片格式
      format: png
      # 质量 (0.0-1.0)
      quality: 1.0
    # 图片通用配置
    image:
      # 默认图片格式（不包含点）
      default-format: png
      # 默认图片质量
      default-quality: 1.0
      # 是否自动添加文件扩展名
      auto-add-extension: true
    # 修改器配置
    modifier:
      # 修改器图片存放目录
      image-dir: ${game.auto.base-dir}/modifier
      # 查找游戏按钮图片名称
      find-game-button-image: find_game_button
      # 人物属性标签图片名称
      character-attribute-label-image: character_attribute_label
      # 经验值输入框标签图片名称
      experience-input-box-label-image: exp_input_box_label
      # 物品信息标签图片名称
      item-info-label-image: item_info_label
      # 物品信息标签栏下的所有物品相对于信息标签的偏移量
      item-offset-x: 50
      item-offset-y: 12
      # 物品标签图片的高度
      item-label-height: 14
      # 目标值标签图片名称
      target-value-label-image: target_value_label
      # 输入框相对于目标值标签的偏移量
      input-offset-x: 0
      input-offset-y: 20
      # 修改按钮图片名称
      modify-button-image: modify_button
      lock-interval-image: lock_interval_button

    # 准备房间配置
    prepare-room:
      # 准备房间图片存放目录
      image-dir: ${game.auto.base-dir}/prepare_room
      # 开始游戏按钮图片名称
      start-game-button-image: start_game_button
      # 房间号标识图片名称
      room-number-label-image: room_number_label
      # 房间号输入框相对于标识的偏移量
      room-number-offset-x: 0
      room-number-offset-y: 20
    # 平台配置
    platform:
      # 平台图片存放目录
      image-dir: ${game.auto.base-dir}/common/kkPlatform
      # 平台 logo 图片名称
      platform-logo-image: platform_logo
      # 创建房间按钮图片名称
      create-room-button-image: create_room_button
    # 小偷游戏配置
    thief:
      # 小偷游戏图片存放目录
      image-dir: ${game.auto.base-dir}/thief_gold
      folder:
        common: common
        archiver-prefix: archiver_
        equipment: equipment
        locker: locker
        thief-hero: thief
        final-boss: final_boss
        enhance-building: enhancement_building
      # 小偷游戏图片名称
      game-image:
        locker-image: locker
        final-boss-building-image: final_boss_building
        attribute-enhance-building-image: attribute_enhance_building
        thief-drop-skill-image: thief_drop_skill
        thief-left-top-image: thief_left_top
        thief-perfect-discard-point-image: perfect_discard_point
        locker-skill-image: locker_skill
        locker-ice-halo-skill-image: locker_ice_halo_skill
        attack-speed-up-image: attack_speed_up
        range-up--image: range_up
        multi-shot-up-image: multi_shot_up
        final-boss-image: final_boss
        victory-image: victory
      # 编号配置
      numbering:
        thief-number: 1
        locker-number: 2
        final-boss-building-number: 3
        attribute-enhance-building-number: 4
      # 存档建筑配置
      archiver-building-numbers: [1, 2, 3, 4, 5, 6]
      # 装备物品配置
      equipment-names: ["w290", "w291", "w293", "IOOC"]
      # 修改物品配置
      modify-item:
        first-modify: ["w291"]
        second-modify: ["w291", "w293", "w293", "w290", "w290"]
        third-modify: ["w293", "w293", "w293", "w293", "w293", "w293"]
        default-modify: ["IOOC", "IOOC", "IOOC", "IOOC", "IOOC", "IOOC"]
      gold-mine-offset-x: 0
      gold-mine-offset-y: 80
      devour-equipment-times: 12
      attack-speed-up-times: 3
      range-up-times: 3
      multi-shot-up-times: 1
      # 小偷游戏主时间, 15min, 当前单位是毫秒
      thief-game-run-time: 900000
      # 小偷游戏失败时间, 2min, 当前单位是毫秒
      thief-game-failure-time: 120000
      thief-game-archiver-time: 30000
      attack-sKey: A
      ten-click-sKey: T