game:
  auto:
    # 基础路径配置
    base-dir: D:/image/automation

    # 图像识别通用配置
    image-recognition:
      default-scale: 0.6667
      # 置信度
      similarityThreshold: 0.75
      # 图片每次识别的间隔
      interval: 500
      # 矩形框粗细
      rect-thickness: 2
      # 矩形颜色配置 (BGR 格式)
      rect-color-b: 0.0
      rect-color-g: 0.0
      rect-color-r: 255.0
    # 超时配置 (毫秒)
    timeout:
      default: 3000
      short: 1000
      medium: 5000
      long: 10000
      window-switch: 1000
      find-image: 5000

    # 重试配置
    retry:
      max-attempts: 3
      delay: 1000
      backoff-multiplier: 1.5

    # 鼠标键盘操作配置
    operation:
      click-delay: 250
      double-click-interval: 300
      key-press-duration: 100
      mouse-move-speed: 100
      move-duration: 200

    # 窗口配置
    window:
      # 平台和准备房间窗口名称（同名）
      platform-and-room-name: KK官方对战平台
      # 修改器窗口名称
      modifier-name: 魔兽3内存修改器
      # 游戏主体窗口名称
      game-name: Warcraft III
      # 窗口切换等待时间
      switch-wait-time: 1000
      # 窗口切换超时时间
      timeout: 5000
    # 截图配置
    screenshot:
      # 结果保存目录
      result-dir: ${game.auto.base-dir}/results
      # 临时截图目录
      temp-dir: ${game.auto.base-dir}/temp
      # 图片格式
      format: png
      # 质量 (0.0-1.0)
      quality: 1.0