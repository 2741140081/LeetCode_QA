<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小偷游戏管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-section h2 {
            color: #667eea;
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input[type="number"],
        .form-group select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input[type="number"]:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 10px;
            background: white;
            border-radius: 5px;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .checkbox-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .checkbox-item.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .checkbox-item input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .btn-reset {
            background: #f0f0f0;
            color: #666;
        }

        .btn-reset:hover {
            background: #e0e0e0;
        }

        .result-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .result-content {
            background: white;
            padding: 40px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .result-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .result-icon.success {
            color: #4caf50;
        }

        .result-icon.error {
            color: #f44336;
        }

        .result-message {
            font-size: 18px;
            margin-bottom: 30px;
            color: #333;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .help-text {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .status-bar {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4caf50;
        }

        .status-dot.offline {
            background: #f44336;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎮 小偷游戏管理系统</h1>
        <p>KK 平台游戏自动化控制台</p>
    </div>

    <div class="content">
        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-item">
                <div class="status-dot" id="connectionStatus"></div>
                <span id="connectionText">连接中...</span>
            </div>
            <div class="status-item">
                <span>📊 系统状态：</span>
                <strong id="systemStatus">就绪</strong>
            </div>
        </div>

        <form id="thiefGameForm">
            <!-- 基础配置 -->
            <div class="form-section">
                <h2>⚙️ 基础配置</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label for="gameName">游戏名称</label>
                        <input type="text" id="gameName" name="gameName" value="小偷偷金" required>
                        <div class="help-text">请输入要启动的游戏名称</div>
                    </div>
                    <div class="form-group">
                        <label for="difficulty">游戏难度 (1-100)</label>
                        <input type="number" id="difficulty" name="difficulty" min="1" max="100" value="10" required>
                        <div class="help-text">推荐值：10-30</div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="gameMode">游戏模式</label>
                        <select id="gameMode" name="gameMode" required>
                            <option value="0">模式 0 - 普通模式</option>
                            <option value="1">模式 1 - 困难模式</option>
                            <option value="2">模式 2 - 地狱模式</option>
                            <option value="3">模式 3 - 噩梦模式</option>
                            <option value="4">模式 4 - 传奇模式</option>
                        </select>
                        <div class="help-text">选择不同的游戏难度模式</div>
                    </div>
                </div>
            </div>

            <!-- 挑战选择 -->
            <div class="form-section">
                <h2>🎯 挑战类型选择</h2>
                <div class="checkbox-group" id="challengesGroup">
                    <label class="checkbox-item">
                        <input type="checkbox" name="challenges" value="1">
                        <span>挑战 1</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="challenges" value="2">
                        <span>挑战 2</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="challenges" value="3">
                        <span>挑战 3</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="challenges" value="4">
                        <span>挑战 4</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="challenges" value="5">
                        <span>挑战 5</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="challenges" value="6">
                        <span>挑战 6</span>
                    </label>
                </div>
                <div class="help-text" style="margin-top: 10px;">
                    💡 提示：至少选择一个挑战，或全部不选使用默认挑战
                </div>
            </div>

            <!-- 存档建筑选择 -->
            <div class="form-section">
                <h2>🏰 存档建筑挑战</h2>
                <div class="checkbox-group" id="archiverBuildingsGroup">
                    <label class="checkbox-item">
                        <input type="checkbox" name="archiverBuildings" value="1">
                        <span>存档建筑 1</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="archiverBuildings" value="2">
                        <span>存档建筑 2</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="archiverBuildings" value="3">
                        <span>存档建筑 3</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="archiverBuildings" value="4">
                        <span>存档建筑 4</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="archiverBuildings" value="5">
                        <span>存档建筑 5</span>
                    </label>
                    <label class="checkbox-item">
                        <input type="checkbox" name="archiverBuildings" value="6">
                        <span>存档建筑 6</span>
                    </label>
                </div>
                <div class="help-text" style="margin-top: 10px;">
                    💡 提示：选择要挑战的存档 BOSS 建筑
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="btn-group">
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span id="btnText">🚀 开始执行</span>
                    <span id="btnLoading" class="loading" style="display: none;"></span>
                </button>
                <button type="reset" class="btn btn-reset">
                    🔄 重置表单
                </button>
            </div>
        </form>
    </div>
</div>

<!-- 结果弹窗 -->
<div class="result-modal" id="resultModal">
    <div class="result-content">
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-message" id="resultMessage"></div>
        <button class="btn btn-primary" onclick="closeModal()">确定</button>
    </div>
</div>

<script>
        // 页面加载检查连接状态
        window.addEventListener('DOMContentLoaded', function() {
            checkConnection();
            initCheckboxBehavior();
        });

        // 检查系统连接状态
        function checkConnection() {
            const statusDot = document.getElementById('connectionStatus');
            const statusText = document.getElementById('connectionText');

            fetch('/kk/api/thief-game/status')
                .then(response => {
                    if (response.ok) {
                        statusDot.classList.remove('offline');
                        statusText.textContent = '已连接';
                    } else {
                        throw new Error('连接失败');
                    }
                })
                .catch(error => {
                    statusDot.classList.add('offline');
                    statusText.textContent = '未连接';
                });
        }

        // 初始化复选框行为
        function initCheckboxBehavior() {
            const checkboxItems = document.querySelectorAll('.checkbox-item');

            checkboxItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    if (e.target.type !== 'checkbox') {
                        const checkbox = this.querySelector('input[type="checkbox"]');
                        checkbox.checked = !checkbox.checked;
                    }

                    // 更新样式
                    const checkbox = this.querySelector('input[type="checkbox"]');
                    if (checkbox.checked) {
                        this.classList.add('selected');
                    } else {
                        this.classList.remove('selected');
                    }
                });

                // 初始化状态
                const checkbox = item.querySelector('input[type="checkbox"]');
                if (checkbox.checked) {
                    item.classList.add('selected');
                }
            });
        }

        // 表单提交处理
        document.getElementById('thiefGameForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoading = document.getElementById('btnLoading');

            // 获取表单数据
            const formData = new FormData(this);
            const data = {
                gameName: formData.get('gameName'),
                difficulty: parseInt(formData.get('difficulty')),
                gameMode: parseInt(formData.get('gameMode')),
                challenges: formData.getAll('challenges').map(Number),
                archiverBuildings: formData.getAll('archiverBuildings').map(Number)
            };

            // 验证
            if (data.difficulty < 1 || data.difficulty > 100) {
                showModal('error', '游戏难度必须在 1-100 之间！');
                return;
            }

            if (data.gameMode < 0 || data.gameMode > 4) {
                showModal('error', '游戏模式必须在 0-4 之间！');
                return;
            }

            // 显示加载状态
            submitBtn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'inline-block';
            document.getElementById('systemStatus').textContent = '执行中...';

            try {
                const response = await fetch('/kk/api/thief-game/execute', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    showModal('success', '✅ ' + result.message);
                } else {
                    showModal('error', '❌ ' + result.message);
                }
            } catch (error) {
                showModal('error', '❌ 请求失败：' + error.message);
            } finally {
                // 恢复按钮状态
                submitBtn.disabled = false;
                btnText.style.display = 'inline';
                btnLoading.style.display = 'none';
                document.getElementById('systemStatus').textContent = '就绪';
            }
        });

        // 显示结果弹窗
        function showModal(type, message) {
            const modal = document.getElementById('resultModal');
            const icon = document.getElementById('resultIcon');
            const msgElement = document.getElementById('resultMessage');

            icon.className = 'result-icon ' + type;
            icon.innerHTML = type === 'success' ? '✔️' : '❌';
            msgElement.textContent = message;

            modal.style.display = 'flex';
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('resultModal').style.display = 'none';
        }

        // 点击弹窗外部关闭
        document.getElementById('resultModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // 表单重置时的处理
        document.getElementById('thiefGameForm').addEventListener('reset', function() {
            setTimeout(() => {
                const checkboxItems = document.querySelectorAll('.checkbox-item');
                checkboxItems.forEach(item => {
                    const checkbox = item.querySelector('input[type="checkbox"]');
                    if (checkbox.checked) {
                        item.classList.add('selected');
                    } else {
                        item.classList.remove('selected');
                    }
                });
            }, 10);
        });
</script>
</body>
</html>
